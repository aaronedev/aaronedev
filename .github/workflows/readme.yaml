---
# .github/workflows/readme.yaml
name: Update README
"on":
  schedule:
  - cron: "0 3 * * *" # Daily at 02:00 UTC (after WakaTime updates)
  workflow_dispatch: {}
concurrency:
  group: readme-update
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Sync main
      run: git pull --ff-only origin main
    - name: Render README
      uses: muesli/readme-scribe@master
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN && secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      with:
        template: templates/README.md.tpl
        writeTo: README.md
    - name: Ensure WakaTime markers
      run: |
        python3 - <<'PY'
        from pathlib import Path

        path = Path("README.md")
        text = path.read_text()
        start = "<!--START_SECTION:waka-->"
        end = "<!--END_SECTION:waka-->"

        if start in text and end in text:
            raise SystemExit(0)

        needle = "### ✨ WakaTime stats ✨\n<details>\n  <summary>Click to expand the latest metrics</summary>\n"
        replacement = f"{needle}\n{start}\n{end}\n"

        if needle not in text:
            raise SystemExit("Unable to find WakaTime details block in README.md")

        path.write_text(text.replace(needle, replacement, 1))
        PY
    - name: Inject WakaTime metrics
      uses: anmol098/waka-readme-stats@v4
      with:
        WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        SHOW_PROFILE_VIEWS: "False"
        SHOW_LINES_OF_CODE: "False"
        SHOW_LOC_CHART: "False"
    - name: Commit and push updates
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN && secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      run: |-
        set -euo pipefail

        if git diff --quiet HEAD -- README.md; then
          echo "README already up to date."
          exit 0
        fi

        git config user.name "readme-scribe 🤖"
        git config user.email "actions@github.com"

        git add README.md
        git commit -m "chore: update README from template"

        if ! git pull --rebase --autostash --strategy-option=ours origin main; then
          echo "Rebase failed, aligning with latest origin/main" >&2
          git rebase --abort || true
          git fetch origin main
          git reset --soft origin/main

          if git diff --cached --quiet; then
            echo "Template already matches remote after soft reset. Nothing to push."
            exit 0
          fi

          git commit -m "chore: update README from template"
        fi

        git push origin HEAD:main
